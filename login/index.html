<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <style>
      :root {
        --blue: #0f172a;
        --blue-soft: #1e293b;
        --orange: #f97316;
        --orange-soft: #fb923c;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --border: #1f2937;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #020617, var(--blue));
        color: var(--text);
      }

      .login-container {
        width: 100%;
        max-width: 380px;
        padding: 32px;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border);
        box-shadow: 0 0 40px rgba(249, 115, 22, 0.1);
      }

      .title {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 8px;
      }

      .title span {
        color: var(--orange);
      }

      .subtitle {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 24px;
      }

      .input-group {
        margin-bottom: 16px;
      }

      label {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 6px;
        display: block;
      }

      input {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--blue-soft);
        color: var(--text);
        outline: none;
        transition: 0.2s;
      }

      input:focus {
        border-color: var(--orange);
        box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.2);
      }

      .btn {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        background: linear-gradient(135deg, var(--orange), var(--orange-soft));
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(249, 115, 22, 0.3);
      }

      .footer {
        margin-top: 16px;
        font-size: 13px;
        text-align: center;
        color: var(--muted);
      }

      .footer a {
        color: var(--orange);
        text-decoration: none;
      }

      .footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <div class="title">Login <span>Portal</span></div>
      <div class="subtitle">Access your backend dashboard</div>

      <form>
        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="you@example.com" required />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" required />
        </div>

        <button class="btn" type="submit">Sign In</button>
      </form>

      <div class="footer">Don't have an account? <a href="#">Register</a></div>
    </div>
  </body>
</html>
